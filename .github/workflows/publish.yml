name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'jolestar/mdorigin'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish
